const Spark = ({ data, color = c.accent, w = 80, h = 24 }) => {
  const valid = data.filter(v => v != null);
  if (valid.length < 2) return <span style={{ color: c.textMuted, fontSize: 11 }}>—</span>;
  const mn = Math.min(...valid), mx = Math.max(...valid);
  const range = mx - mn || 1;
  const pts = valid.map((v, i) => `${(i / (valid.length - 1)) * w},${h - ((v - mn) / range) * h}`).join(" ");
  return <svg width={w} height={h} style={{ display: "block" }}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" /></svg>;
};

const KpiCard = ({ label, value, sub, subColor }) => (
  <div style={{ background: c.card, border: `1px solid ${c.cardBorder}`, borderRadius: 8, padding: "16px 20px", minWidth: 140, flex: 1 }}>
    <div style={{ fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.2, color: c.textMuted, marginBottom: 6 }}>{label}</div>
    <div style={{ fontSize: 28, fontWeight: 700, color: c.textPrimary, lineHeight: 1 }}>{value}</div>
    {sub && <div style={{ fontSize: 12, color: subColor || c.textSecondary, marginTop: 6 }}>{sub}</div>}
  </div>
);

const Pill = ({ label, active, onClick }) => (
  <button onClick={onClick} style={{ background: active ? c.accent : "transparent", color: active ? c.bg : c.textSecondary, border: `1px solid ${active ? c.accent : c.cardBorder}`, borderRadius: 20, padding: "6px 16px", fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all .15s" }}>{label}</button>
);

const Tab = ({ label, active, onClick }) => (
  <button onClick={onClick} style={{ background: "none", border: "none", borderBottom: active ? `2px solid ${c.accent}` : "2px solid transparent", color: active ? c.textPrimary : c.textMuted, fontSize: 14, fontWeight: 600, padding: "8px 16px", cursor: "pointer", transition: "all .15s" }}>{label}</button>
);

const ChgCell = ({ v, pct }) => {
  if (v == null || v === "N/A") return <span style={{ color: c.textMuted }}>—</span>;
  const num = typeof v === "number" ? v : parseFloat(v);
  if (isNaN(num) || num === 0) return <span style={{ color: c.textSecondary }}>0</span>;
  const col = num > 0 ? c.green : c.red;
  return <span style={{ color: col, fontWeight: 600 }}>{num > 0 ? "+" : ""}{pct ? num.toFixed(1) + "%" : num}</span>;
};

const CustomTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: c.card, border: `1px solid ${c.cardBorder}`, borderRadius: 6, padding: "8px 12px", fontSize: 12 }}>
      <div style={{ color: c.accent, fontWeight: 600, marginBottom: 2 }}>{label}</div>
      {payload.map((p, i) => <div key={i} style={{ color: p.color || c.textPrimary }}>{p.name}: <b>{typeof p.value === "number" ? p.value.toFixed(1) : p.value}</b></div>)}
    </div>
  );
};

  }, [mgr, fund, sort]);

    const vacCOH = filtered.reduce((s, p) => s + p.mhCV, 0);

          <div style={{ display: "flex", gap: 6 }}>
            {[["pct", "Occupancy %"], ["count", "Occupied #"]].map(([k, l]) => (
              <button key={k} onClick={() => setHistMode(k)} style={{ background: histMode === k ? c.accent : "transparent", color: histMode === k ? c.bg : c.textMuted, border: `1px solid ${histMode === k ? c.accent : c.cardBorder}`, borderRadius: 6, padding: "4px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>{l}</button>
            ))}
          </div>
          <div style={{ display: "flex", gap: 6, marginLeft: 6, paddingLeft: 12, borderLeft: `1px solid ${c.cardBorder}` }}>
            {[["total", "Total"], ["mh", "MH"], ["ro", "RV+O"]].map(([k, l]) => (
              <button key={k} onClick={() => setHistSegment(k)} style={{ background: histSegment === k ? c.purple : "transparent", color: histSegment === k ? "#fff" : c.textMuted, border: `1px solid ${histSegment === k ? c.purple : c.cardBorder}`, borderRadius: 6, padding: "4px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>{l}</button>
            ))}
          </div>
        </div>
        <div style={{ background: c.card, border: `1px solid ${c.cardBorder}`, borderRadius: 8, overflow: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 900 }}>
            <thead>
              <tr>
                <th style={{ ...thStyle, position: "sticky", left: 0, background: c.card, zIndex: 1 }}>Property</th>
                {MONTHS.map(m => <th key={m} style={{ ...thStyle, textAlign: "center", fontSize: 10 }}>{m.replace("20", "'")}</th>)}
              </tr>
            </thead>
            <tbody>
              {filtered.map(p => {
                let src;
                if (histMode === "pct") {
                  // Pct: total uses OCC_PCT, MH uses MH_PCT, RV+O computed from counts
                  if (histSegment === "total") src = OCC_PCT;
                  else if (histSegment === "mh") src = MH_PCT;
                  else {
                    // RV+O pct: derive from RO_COUNTS / (p.roT)
                    const counts = RO_COUNTS[p.n] || [];
                    const tot = p.roT;
                    src = { [p.n]: counts.map(v => (v != null && tot > 0) ? (v / tot * 100) : null) };
                  }
                } else {
                  if (histSegment === "total") src = OCC_COUNTS;
                  else if (histSegment === "mh") src = MH_COUNTS;
                  else src = RO_COUNTS;
                }
                const vals = src[p.n] || [];
                return (
                  <tr key={p.n}>
                    <td style={{ ...tdStyle, fontWeight: 600, fontSize: 12, position: "sticky", left: 0, background: c.card, zIndex: 1, whiteSpace: "nowrap" }}>{p.n}</td>
                    {vals.map((v, i) => {
                      let bg = "transparent";
                      if (histMode === "pct" && v != null && typeof v === "number") {
                        bg = v >= 92 ? "rgba(16,185,129,0.12)" : v >= 80 ? "rgba(245,158,11,0.1)" : "rgba(239,68,68,0.12)";
                      }
                      return <td key={i} style={{ ...tdR, textAlign: "center", fontSize: 12, background: bg }}>{v == null ? <span style={{ color: c.textMuted }}>—</span> : histMode === "pct" ? v.toFixed(1) : v}</td>;
                    })}
                  </tr>
                );
              })}
              <tr style={{ background: "#1a2332" }}>
                <td style={{ ...tdStyle, fontWeight: 700, position: "sticky", left: 0, background: "#1a2332", zIndex: 1 }}>PORTFOLIO ({histSegment === "total" ? "Total" : histSegment === "mh" ? "MH" : "RV+O"})</td>
                {(() => {
                  let portKey = "PORTFOLIO TOTAL";
                  let src;
                  if (histMode === "pct") {
                    if (histSegment === "total") src = OCC_PCT;
                    else if (histSegment === "mh") src = MH_PCT;
                    else {
                      // Compute RV+O portfolio % from RO_COUNTS sum vs roT sum across filtered
                      const months = MONTHS;
                      const totalRoT = filtered.reduce((s,p)=>s+p.roT, 0);
                      src = { [portKey]: months.map((_, i) => {
                        const sum = filtered.reduce((s,p)=>{
                          const v = (RO_COUNTS[p.n]||[])[i];
                          return s + (v != null ? v : 0);
                        }, 0);
                        return totalRoT > 0 ? (sum / totalRoT * 100) : null;
                      }) };
                    }
                  } else {
                    if (histSegment === "total") src = OCC_COUNTS;
                    else if (histSegment === "mh") src = MH_COUNTS;
                    else src = RO_COUNTS;
                  }
                  return (src[portKey] || []).map((v, i) => (
                    <td key={i} style={{ ...tdR, textAlign: "center", fontWeight: 700, color: c.accent }}>{v == null ? "—" : histMode === "pct" ? v.toFixed(1) : v.toLocaleString()}</td>
                  ));
                })()}
              </tr>
            </tbody>
          </table>
        </div>
      </>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Dashboard />);
</script></body></html>
